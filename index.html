<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read to Unlock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #fff3ec;
      color: #ff6b2b;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    h1 span { color: #ff6b2b; }
    p.tagline {
      font-size: 1.15rem;
      color: #666;
      max-width: 400px;
      margin: 0 auto 32px;
    }
    .cta {
      display: inline-block;
      background: #ff6b2b;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      margin-bottom: 48px;
      transition: background 0.15s;
    }
    .cta:hover { background: #e85a1e; }
    .links {
      font-size: 0.9rem;
      color: #999;
    }
    .links a {
      color: #ff6b2b;
      text-decoration: none;
      margin: 0 10px;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <span class="badge">Available on iOS</span>

  <h1>Read first.<br><span>Scroll later.</span></h1>

  <p class="tagline">Block distracting apps until you finish your daily reading goal.</p>

  <!-- Replace href with your App Store link -->
  <a class="cta" href="#">Download on the App Store</a>

  <div class="links">
    <a href="support.html">Support</a>
    <a href="privacy.html">Privacy Policy</a>
  </div>

</body>
</html>
